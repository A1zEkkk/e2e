services:
  db:
    image: postgres:16
    container_name: my_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
  app:
    build: .
    container_name: my_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

